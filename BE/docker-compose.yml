services:
  # --- Infrastructure ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd!
      - MSSQL_PID=Developer
    ports:
      - "11433:1433"
    networks:
      - capstone-network

  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"
    networks:
      - capstone-network

  # --- API Gateway ---
  api-gateway:
    build: 
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "5000:8080"
    environment:
      - Jwt__SigningKey=capstone-review-tool-development-signing-key
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - identity-svc
      - project-svc
      - scheduling-svc
      - evaluation-svc
      - notification-svc
      - user-profile-svc
    networks:
      - capstone-network

  # --- Microservices ---
  identity-svc:
    build: 
      context: ./IdentityService
      dockerfile: Dockerfile
    container_name: identity-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=IdentityDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
      - Jwt__SigningKey=capstone-review-tool-development-signing-key
      - Kafka__BootstrapServers=kafka:9092
    ports:
      - "8081:8080" # Exposed for direct debugging if needed, but normally routed through YARP
    depends_on:
      - sqlserver
    networks:
      - capstone-network

  project-svc:
    build:
      context: ./ProjectService
      dockerfile: Dockerfile
    container_name: project-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ProjectDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
      - Jwt__SigningKey=capstone-review-tool-development-signing-key
      - Kafka__BootstrapServers=kafka:9092
      - Grpc__UserProfileAddress=http://user-profile-svc:8080
    ports:
      - "8082:8080"
    volumes:
      - project-uploads:/app/uploads
    depends_on:
      - sqlserver
      - kafka
      - user-profile-svc
    networks:
      - capstone-network

  scheduling-svc:
    build:
      context: ./SchedulingService
      dockerfile: Dockerfile
    container_name: scheduling-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=SchedulingDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
      - Jwt__SigningKey=capstone-review-tool-development-signing-key
      - Kafka__BootstrapServers=kafka:9092
    ports:
      - "8083:8080"
    depends_on:
      - sqlserver
      - kafka
    networks:
      - capstone-network

  evaluation-svc:
    build:
      context: ./EvaluationService
      dockerfile: Dockerfile
    container_name: evaluation-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EvaluationDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
      - Jwt__SigningKey=capstone-review-tool-development-signing-key
      - Kafka__BootstrapServers=kafka:9092
    ports:
      - "8084:8080"
    depends_on:
      - sqlserver
      - kafka
    networks:
      - capstone-network

  notification-svc:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: notification-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=NotificationDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
      - Jwt__SigningKey=capstone-review-tool-development-signing-key
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__GroupId=notification-service
    ports:
      - "8085:8080"
    depends_on:
      - sqlserver
      - kafka
    networks:
      - capstone-network

  user-profile-svc:
    build:
      context: ./UserProfileService
      dockerfile: Dockerfile
    container_name: user-profile-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=IdentityDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
      - ASPNETCORE_URLS=http://+:8080
      - Kestrel__EndpointDefaults__Protocols=Http2
    ports:
      - "8086:8080"
    depends_on:
      - sqlserver
    networks:
      - capstone-network

networks:
  capstone-network:
    driver: bridge

volumes:
  project-uploads:
