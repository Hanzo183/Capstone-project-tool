version: '3.8'

services:
  # --- Infrastructure ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd!
      - MSSQL_PID=Developer
    ports:
      - "11433:1433"
    networks:
      - capstone-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    networks:
      - capstone-network

  # --- API Gateway ---
  api-gateway:
    build: 
      context: ./ApiGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "5000:8080"
    depends_on:
      - identity-svc
      - project-svc
      - scheduling-svc
      - evaluation-svc
      - notification-svc
    networks:
      - capstone-network

  # --- Microservices ---
  identity-svc:
    build: 
      context: ./IdentityService
      dockerfile: Dockerfile
    container_name: identity-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=IdentityDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
    ports:
      - "8081:8080" # Exposed for direct debugging if needed, but normally routed through YARP
    depends_on:
      - sqlserver
    networks:
      - capstone-network

  project-svc:
    build:
      context: ./ProjectService
      dockerfile: Dockerfile
    container_name: project-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ProjectDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
    ports:
      - "8082:8080"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - capstone-network

  scheduling-svc:
    build:
      context: ./SchedulingService
      dockerfile: Dockerfile
    container_name: scheduling-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=SchedulingDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
    ports:
      - "8083:8080"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - capstone-network

  evaluation-svc:
    build:
      context: ./EvaluationService
      dockerfile: Dockerfile
    container_name: evaluation-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EvaluationDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
    ports:
      - "8084:8080"
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - capstone-network

  notification-svc:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    container_name: notification-svc
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=NotificationDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True;
    ports:
      - "8085:8080"
    depends_on:
      - rabbitmq
    networks:
      - capstone-network

networks:
  capstone-network:
    driver: bridge
