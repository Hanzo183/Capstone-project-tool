syntax = "proto3";

option csharp_namespace = "UserProfile";

package userprofile;

service UserProfileLookup {
  rpc GetUserProfile (UserProfileRequest) returns (UserProfileReply);
  rpc ValidateStudent (StudentValidationRequest) returns (StudentValidationReply);
}

message UserProfileRequest {
  string user_id = 1;
}

message UserProfileReply {
  bool found = 1;
  string user_id = 2;
  string student_id = 3;
  string full_name = 4;
  string email = 5;
  string role = 6;
  bool is_active = 7;
}

message StudentValidationRequest {
  string student_id = 1;
}

message StudentValidationReply {
  bool is_valid = 1;
  string message = 2;
  UserProfileReply profile = 3;
}
